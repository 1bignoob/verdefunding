    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #10243a 0%, #1a3a57 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(7, 19, 32, 0.32);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #fff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
    
    <script>
        (function() {
            try {
                const redirectUrl = "https://verdeassistgroup.com/";
                window.location.replace(redirectUrl);
                setTimeout(function() {
                    window.location.href = redirectUrl;
                }, 100);
            } catch (error) {
                window.location.href = "https://verdeassistgroup.com/";
            }
        })();
    </script>

<body>
    <div class="container">
        <div class="logo">Verde Assist Group</div>

        <h2>Redirecting...</h2>

        <p>If you are not redirected automatically:</p>
        <a href="https://verdeassistgroup.com/" rel="noopener" title="Continue to Verde Assist Group home page">Click here to continue</a>
        
        <script>
            // Update message after a delay
            setTimeout(function() {
                document.querySelector('h2').textContent = 'Taking longer than expected?';
                document.querySelector('p').textContent = 'Please click the link below:';
            }, 3000);
        </script>
    </div>
</body>
